<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMVLIVE - Premium Sports</title>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF4500; --bg: #050512; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 69, 0, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }
        .match-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 28px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .match-card:hover { transform: translateY(-12px); border-color: var(--primary); box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .live-badge { background: #FF0000; animation: pulse 2s infinite; box-shadow: 0 0 15px #FF0000; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); opacity: 0.7; } }
        .btn-play { background: linear-gradient(135deg, #FF4500, #FF8C00); border-radius: 18px; font-weight: 800; transition: 0.3s; }
        #tg-popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-6 md:p-12 text-center">

    <header class="mb-10 text-6xl md:text-7xl font-black italic tracking-tighter">CMV<span class="text-orange-500">LIVE</span></header>

    <div class="flex justify-center mb-16 min-h-[100px]">
        <div class="rounded-xl border border-white/10 bg-white/5 p-2">
            <script type="text/javascript">
                if(window.aclib) { aclib.runBanner({ zoneId: '11072102' }); }
            </script>
        </div>
    </div>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        </div>

    <div id="qModal" class="modal">
        <div class="bg-[#0f172a] p-10 rounded-[45px] border-2 border-orange-600 w-full max-w-sm">
            <h3 class="text-2xl font-black mb-8 text-white uppercase italic">Select Quality</h3>
            <div id="qList" class="space-y-4"></div>
            <button onclick="closeModal()" class="mt-8 text-slate-500 font-bold uppercase text-[10px]">Close</button>
        </div>
    </div>

    <div id="tg-popup">
        <div class="bg-[#111827] border-2 border-orange-500 rounded-[40px] p-10 max-w-sm">
            <h2 class="text-3xl font-black mb-4 uppercase italic text-white">Join The Squad</h2>
            <p class="text-slate-400 text-sm mb-8">Backup links & memes @cricketmemesverse873</p>
            <a href="https://t.me/cricketmemesverse873" target="_blank" class="block w-full py-4 btn-play text-white mb-4">JOIN NOW</a>
            <button onclick="closeTG()" class="text-slate-600 text-xs uppercase font-bold">Later</button>
        </div>
    </div>

    <script>
        const API = "https://raw.githubusercontent.com/doctor-8trange/zyphx8/refs/heads/main/data/fancode.json";
        let matches = [];

        async function init() {
            try {
                const res = await fetch(API + '?t=' + Date.now());
                const data = await res.json();
                matches = data.matches || [];
                render();
            } catch (e) { document.getElementById('grid').innerHTML = "Fetch Error."; }
        }

        function render() {
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            matches.forEach((m, i) => {
                const live = (m.status || "").toUpperCase() === "LIVE";
                grid.innerHTML += `
                    <div class="match-card p-6 flex flex-col text-left">
                        <div class="relative rounded-[22px] overflow-hidden mb-6 aspect-video bg-slate-900">
                            <img src="${m.image}" class="w-full h-full object-cover">
                            ${live ? '<span class="absolute top-4 left-4 live-badge text-white text-[10px] font-black px-3 py-1 rounded-full uppercase italic">Live</span>' : ''}
                        </div>
                        <div class="flex-grow">
                            <p class="text-orange-500 text-[10px] font-black uppercase mb-1">${m.tournament}</p>
                            <h3 class="text-xl font-bold text-white mb-8 line-clamp-2">${m.title}</h3>
                        </div>
                        <button onclick="${live ? `openQ(${i})` : ''}" class="btn-play w-full py-4 text-white text-xs tracking-widest ${!live ? 'opacity-20 grayscale cursor-not-allowed' : ''}">
                            ${live ? 'WATCH NOW' : 'NOT LIVE'}
                        </button>
                    </div>`;
            });
        }

        function openQ(idx) {
            const m = matches[idx]; const list = document.getElementById('qList'); list.innerHTML = "";
            const autoData = m.auto_streams?.[0]?.auto || "";
            if(autoData.includes("RESOLUTION=")) {
                autoData.split("\n").forEach((line, i, arr) => {
                    if(line.includes("RESOLUTION=")) {
                        const res = line.split("RESOLUTION=")[1].split(",")[0].split("x")[1] + "p";
                        list.innerHTML += `<button onclick="go('${arr[i+1].trim()}')" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 flex justify-between items-center text-white hover:border-orange-500"><span class="font-black italic uppercase">${res}</span> <i class="fas fa-play text-orange-500"></i></button>`;
                    }
                });
                document.getElementById('qModal').style.display = 'flex';
            } else { go(m.adfree_stream || m.dai_stream); }
        }
        function go(u) { window.location.href = `player.html?url=${encodeURIComponent(u)}`; }
        function closeModal() { document.getElementById('qModal').style.display = 'none'; }
        function closeTG() { document.getElementById('tg-popup').style.display = 'none'; sessionStorage.setItem('tg_seen', 'true'); }
        window.onload = () => { init(); if(!sessionStorage.getItem('tg_seen')) setTimeout(() => document.getElementById('tg-popup').style.display = 'flex', 4000); };
    </script>
</body>
</html>
