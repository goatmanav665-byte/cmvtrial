<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMVLIVE - Player</title>
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-container { width: 100%; height: 100%; position: relative; }
        .shaka-played-range { background: #FF4500 !important; }
        .shaka-range-element::-webkit-slider-thumb { background: #FF4500 !important; }
        #watermark { position: absolute; top: 15px; right: 15px; width: 50px; opacity: 0.5; z-index: 10; pointer-events: none; }
        .loader { position:absolute; inset:0; background:black; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; font-family: sans-serif;}
        .spin { width:35px; height:35px; border:4px solid #FF4500; border-top-color:transparent; border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <img id="watermark" src="https://fancode.com/favicon.ico">
    <div class="video-container" data-shaka-player-container shaka-controls="true">
        <video id="video" data-shaka-player autoplay playsinline style="width:100%;height:100%;" crossorigin="anonymous"></video>
        <div id="loading" class="loader"><div class="spin"></div><p style="color:#FF4500; font-size:10px; font-weight:bold; margin-top:20px; letter-spacing:2px;">AUTHENTICATING...</p></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        let finalUrl = params.get('url');
        
        // NEW: Construct URL from ID and Quality if provided
        const mId = params.get('id');
        const mQ = params.get('q');
        if(mId && mQ) {
            // This is the FanCode HLS template found in the scanned code
            finalUrl = `https://in-mc-fblive.fancode.com/mumbai/${mId}_hls_44fcc8b57454619_1ta-di_h264/${mQ}p.m3u8`;
        }

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('[data-shaka-player-container]');
            const loader = document.getElementById('loading');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({
                'controlPanelElements': ['play_pause', 'mute', 'time_and_duration', 'spacer', 'quality', 'fullscreen'],
                'seekBarColors': { base: 'rgba(255,255,255,.2)', buffered: 'rgba(255,255,255,.4)', played: '#FF4500' }
            });

            player.configure({ streaming: { bufferingGoal: 30 }, drm: { enabled: false } });

            // THE BYPASS
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['User-Agent'] = 'ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1';
                request.headers['Referer'] = 'https://fancode.com/';
                delete request.headers['Origin'];
            });

            try {
                await player.load(finalUrl);
                loader.style.display = 'none';
            } catch (e) {
                loader.innerHTML = '<p style="color:red; font-weight:bold;">LINK EXPIRED - REFRESH HOME</p>';
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
        window.onload = () => { if(!window.shaka) init(); };
    </script>
</body>
</html>
