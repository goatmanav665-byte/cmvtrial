<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMVLIVE - Premium Sports</title>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF4500; --bg: #050512; }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; text-align: center; }
        .match-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; transition: 0.4s; }
        .match-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .btn-play { background: linear-gradient(135deg, #FF4500, #FF8C00); border-radius: 20px; font-weight: 800; transition: 0.3s; padding: 15px; width: 100%; color: white; display: block; }
        #tg-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="mb-10 text-6xl font-black italic tracking-tighter">CMV<span class="text-orange-500">LIVE</span></header>

    <div class="flex justify-center mb-16 min-h-[100px]">
        <div class="rounded-xl border border-white/5 bg-white/5 p-2">
            <script type="text/javascript">
                if(window.aclib) { aclib.runBanner({ zoneId: '11072102' }); }
            </script>
        </div>
    </div>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>

    <div id="tg-overlay">
        <div class="bg-[#111827] border-2 border-orange-500 rounded-[40px] p-10 max-w-sm text-center">
            <i class="fab fa-telegram-plane text-5xl text-orange-500 mb-6"></i>
            <h2 class="text-3xl font-black mb-4 uppercase text-white">Join The Squad</h2>
            <p class="text-slate-400 text-sm mb-8">Backup links @cricketmemesverse873</p>
            <a href="https://t.me/cricketmemesverse873" target="_blank" class="btn-play mb-4">JOIN NOW</a>
            <button onclick="closeTG()" class="text-slate-600 text-xs uppercase font-bold">Later</button>
        </div>
    </div>

    <script>
        const API = "https://raw.githubusercontent.com/doctor-8trange/zyphx8/refs/heads/main/data/fancode.json";
        async function init() {
            try {
                const res = await fetch(API + '?t=' + Date.now());
                const data = await res.json();
                const grid = document.getElementById('grid'); grid.innerHTML = "";
                (data.matches || []).forEach(m => {
                    const isLive = (m.status || "").toUpperCase() === "LIVE";
                    // EXTRACT THE BEST AVAILABLE LINK
                    const liveLink = m.adfree_stream || m.dai_stream || (m.auto_streams && m.auto_streams[0] ? m.auto_streams[0].auto.split('\n')[3] : "");
                    
                    grid.innerHTML += `
                        <div class="match-card p-6 flex flex-col text-left">
                            <img src="${m.image}" class="rounded-[22px] mb-6 aspect-video object-cover">
                            <h3 class="text-lg font-bold text-white mb-8 line-clamp-2">${m.title}</h3>
                            <button onclick="watch('${encodeURIComponent(liveLink)}')" class="btn-play ${!isLive ? 'opacity-20 pointer-events-none' : ''}">WATCH NOW</button>
                        </div>`;
                });
            } catch (e) { console.log(e); }
        }
        function watch(url) { window.location.href = `player.html?url=${url}`; }
        function closeTG() { document.getElementById('tg-overlay').style.display = 'none'; sessionStorage.setItem('tg', '1'); }
        window.onload = () => { 
            init(); 
            if(!sessionStorage.getItem('tg')) setTimeout(() => document.getElementById('tg-overlay').style.display='flex', 4000);
        };
    </script>
</body>
</html>
