<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMVLIVE - Player</title>
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-container { width: 100%; height: 100%; position: relative; }
        .shaka-played-range { background: #FF4500 !important; }
        #loader { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; font-family: sans-serif; color: #FF4500;}
        .spin { width:35px; height:35px; border:4px solid #FF4500; border-top-color:transparent; border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="video-container" data-shaka-player-container shaka-controls="true">
        <video id="video" data-shaka-player autoplay playsinline style="width:100%;height:100%;" crossorigin="anonymous"></video>
        <div id="loading" class="loader"><div class="spin"></div><p style="margin-top:20px; font-weight:bold; letter-spacing: 2px;">SECURING CONNECTION...</p></div>
    </div>
    <script>
        // Your Verified Proxy
        const PROXY = "https://odd-wood-5267cmvproxy.goatmanav665.workers.dev/";

        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url');

        async function init() {
            if (!streamUrl) { document.getElementById('loading').innerHTML = "NO STREAM LINK"; return; }
            
            const video = document.getElementById('video');
            const container = document.querySelector('[data-shaka-player-container]');
            const loader = document.getElementById('loading');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({
                'controlPanelElements': ['play_pause', 'mute', 'time_and_duration', 'spacer', 'quality', 'fullscreen'],
                'seekBarColors': { base: 'rgba(255,255,255,.2)', played: '#FF4500' }
            });

            // CRITICAL: Force all segments through the proxy to stop 403 and Error 4015
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                const uri = request.uris[0];
                if (uri.includes('fancode.com') && !uri.includes(PROXY)) {
                    request.uris[0] = `${PROXY}?url=${encodeURIComponent(uri)}`;
                }
                delete request.headers['Origin'];
            });

            try {
                // Initial load through proxy
                await player.load(`${PROXY}?url=${encodeURIComponent(streamUrl)}`);
                loader.style.display = 'none';
            } catch (e) {
                console.error("Shaka Code:", e.code);
                loader.innerHTML = '<div style="text-align:center"><p style="color:red; font-weight:bold;">STREAM OFFLINE</p><button onclick="location.href=\'index.html\'" style="background:#FF4500; border:none; padding:10px 20px; color:white; border-radius:50px; margin-top:15px; cursor:pointer;">REFRESH HOME</button></div>';
            }
        }
        document.addEventListener('shaka-ui-loaded', init);
        window.onload = () => { if(!window.shaka) init(); };
    </script>
</body>
</html>
