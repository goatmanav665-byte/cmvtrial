<head>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF4500; --secondary: #00FFFF; --bg: #050512; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 69, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }
        
        /* Glassmorphism Card */
        .match-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .match-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255, 69, 0, 0.3);
        }

        /* Animated Live Badge */
        .live-indicator {
            background: #FF0000;
            box-shadow: 0 0 20px #FF0000;
            animation: pulse-live 1.5s infinite;
        }
        @keyframes pulse-live {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Goated Buttons */
        .btn-watch {
            background: linear-gradient(135deg, #FF4500 0%, #FF8C00 100%);
            border-radius: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-watch:hover {
            filter: brightness(1.2);
            box-shadow: 0 10px 25px rgba(255, 69, 0, 0.4);
        }

        /* Telegram Popup Styles */
        #tg-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .tg-card {
            background: #111827;
            border: 2px solid var(--primary);
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            transform: scale(0.8);
            opacity: 0;
            transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #tg-overlay.active .tg-card { transform: scale(1); opacity: 1; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
