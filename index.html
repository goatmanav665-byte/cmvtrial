<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMVLIVE - Premium Live Sports</title>
    <link rel="icon" href="https://fancode.com/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF4500; --secondary: #00FFFF; --bg: #050512; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 69, 0, 0.15), transparent 40%);
            background-attachment: fixed;
        }
        .match-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px); border-radius: 32px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .match-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .btn-watch { background: linear-gradient(135deg, #FF4500, #FF8C00); border-radius: 20px; font-weight: 800; transition: 0.3s; }
        .live-dot { background: #FF0000; box-shadow: 0 0 10px #FF0000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(15px); }
        #tg-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="text-center mb-16">
        <h1 class="text-6xl font-black tracking-tighter text-white">CMV<span class="text-orange-500">LIVE</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[10px] mt-2">Premium Experience by @cricketmemesverse873</p>
    </header>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="match-card p-6 h-80 animate-pulse bg-white/5"></div>
        <div class="match-card p-6 h-80 animate-pulse bg-white/5"></div>
        <div class="match-card p-6 h-80 animate-pulse bg-white/5"></div>
    </div>

    <div id="qModal" class="modal">
        <div class="bg-[#0f172a] p-10 rounded-[45px] border-2 border-orange-600 w-full max-w-sm text-center">
            <h3 class="text-2xl font-black mb-8 text-white uppercase italic">Select Quality</h3>
            <div id="qList" class="space-y-4"></div>
            <button onclick="closeModal()" class="mt-8 text-slate-500 font-bold uppercase text-[10px]">Close</button>
        </div>
    </div>

    <div id="tg-overlay">
        <div class="bg-[#111827] border-2 border-orange-500 rounded-[40px] p-10 max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fab fa-telegram-plane text-3xl text-orange-500"></i>
            </div>
            <h2 class="text-3xl font-black mb-4 uppercase italic">Join The Squad</h2>
            <p class="text-slate-400 text-sm mb-8">Get instant match links & backup links directly on Telegram.</p>
            <a href="https://t.me/cricketmemesverse873" target="_blank" class="block w-full py-4 btn-watch text-white mb-4">JOIN NOW</a>
            <button onclick="closeTG()" class="text-slate-600 text-xs uppercase font-bold">Later</button>
        </div>
    </div>

    <script>
        const API = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";
        let matches = [];

        async function init() {
            try {
                const res = await fetch(API + '?nocache=' + new Date().getTime());
                const data = await res.json();
                matches = data.matches || [];
                render();
            } catch (e) {
                document.getElementById('grid').innerHTML = `<p class="col-span-full text-center text-red-500">Error Fetching Data.</p>`;
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            matches.forEach((m, i) => {
                const live = (m.status || "").toUpperCase() === "LIVE";
                grid.innerHTML += `
                    <div class="match-card p-6 flex flex-col">
                        <div class="relative rounded-[26px] overflow-hidden mb-6 aspect-video">
                            <img src="${m.image}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x400/0A0A1F/334155?text=CMVLIVE'">
                            ${live ? '<div class="absolute top-4 left-4 flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full"><div class="w-2 h-2 rounded-full live-dot"></div><span class="text-[10px] font-black uppercase">Live</span></div>' : ''}
                        </div>
                        <div class="flex-grow">
                            <p class="text-orange-500 text-[10px] font-black uppercase tracking-widest mb-2">${m.tournament}</p>
                            <h3 class="text-xl font-bold leading-tight mb-8 text-white line-clamp-2">${m.title}</h3>
                        </div>
                        <button onclick="${live ? `openQ(${i})` : ''}" class="btn-watch w-full py-4 text-white text-xs tracking-widest ${!live ? 'opacity-20 cursor-not-allowed' : ''}">
                            ${live ? 'WATCH NOW' : 'NOT LIVE'}
                        </button>
                    </div>`;
            });
        }

        function openQ(idx) {
            const m = matches[idx];
            const list = document.getElementById('qList');
            list.innerHTML = "";
            const master = m.auto_streams?.[0]?.auto || "";
            if(master.includes("RESOLUTION=")) {
                master.split("\n").forEach((l, i, arr) => {
                    if(l.includes("RESOLUTION=")) {
                        const res = l.split("RESOLUTION=")[1].split(",")[0].split("x")[1] + "p";
                        list.innerHTML += `<button onclick="go('${arr[i+1].trim()}')" class="w-full p-5 bg-slate-900 rounded-2xl border border-slate-800 flex justify-between items-center text-white"><span class="font-black italic uppercase">${res}</span> <i class="fas fa-play text-orange-500"></i></button>`;
                    }
                });
                document.getElementById('qModal').style.display = 'flex';
            } else { go(m.adfree_stream || m.dai_stream); }
        }

        function go(u) { window.location.href = `player.html?url=${encodeURIComponent(u)}`; }
        function closeModal() { document.getElementById('qModal').style.display = 'none'; }
        function closeTG() { document.getElementById('tg-overlay').style.display = 'none'; sessionStorage.setItem('tg', 'seen'); }

        window.onload = () => {
            init();
            if(!sessionStorage.getItem('tg')) {
                setTimeout(() => document.getElementById('tg-overlay').style.display = 'flex', 4000);
            }
        };
    </script>
</body>
</html>
