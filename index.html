<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMVLIVE - Premium Live Sports</title>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF4500; --bg: #050512; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 69, 0, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        .match-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 28px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .match-card:hover { transform: translateY(-12px); border-color: var(--primary); box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .live-badge { background: #FF0000; animation: pulse 2s infinite; box-shadow: 0 0 15px #FF0000; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); opacity: 0.7; } }
        .btn-play { background: linear-gradient(135deg, #FF4500, #FF8C00); border-radius: 18px; font-weight: 800; transition: 0.3s; }
        .btn-play:hover { transform: scale(1.05); filter: brightness(1.2); }
        #tg-popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body class="p-6 md:p-12 text-center">

    <header class="mb-12">
        <h1 class="text-6xl md:text-7xl font-black italic tracking-tighter text-white mb-2">CMV<span class="text-orange-500">LIVE</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[10px]">Premium Experience by @cricketmemesverse873</p>
    </header>

    <div class="flex justify-center mb-16 min-h-[100px]">
        <div class="rounded-xl border border-white/10 bg-white/5 p-2">
            <script type="text/javascript">
                if(window.aclib) { aclib.runBanner({ zoneId: '11072102' }); }
            </script>
        </div>
    </div>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        </div>

    <div id="tg-popup">
        <div class="bg-[#111827] border-2 border-orange-500 rounded-[40px] p-10 max-w-sm">
            <i class="fab fa-telegram-plane text-5xl text-orange-500 mb-6"></i>
            <h2 class="text-3xl font-black mb-4 uppercase italic text-white">Join The Squad</h2>
            <p class="text-slate-400 text-sm mb-8">Get instant match alerts and backup links on Telegram!</p>
            <a href="https://t.me/cricketmemesverse873" target="_blank" class="block w-full py-4 btn-play text-white mb-4">JOIN NOW</a>
            <button onclick="closeTG()" class="text-slate-600 text-xs uppercase font-bold">Maybe Later</button>
        </div>
    </div>

    <script>
        // High-Speed Verified JSON Source
        const API = "https://raw.githubusercontent.com/doctor-8trange/zyphx8/refs/heads/main/data/fancode.json";

        async function loadMatches() {
            try {
                const res = await fetch(API + '?nocache=' + Date.now());
                const data = await res.json();
                const grid = document.getElementById('grid'); grid.innerHTML = "";
                (data.matches || []).forEach(m => {
                    const isLive = (m.status || "").toUpperCase() === "LIVE";
                    grid.innerHTML += `
                        <div class="match-card p-6 flex flex-col text-left">
                            <div class="relative rounded-[22px] overflow-hidden mb-6 aspect-video bg-slate-900">
                                <img src="${m.image}" class="w-full h-full object-cover">
                                ${isLive ? '<span class="absolute top-4 left-4 live-badge text-white text-[10px] font-black px-3 py-1 rounded-full uppercase italic">Live</span>' : ''}
                            </div>
                            <p class="text-orange-500 text-[10px] font-black uppercase mb-1">${m.tournament}</p>
                            <h3 class="text-xl font-bold text-white mb-8 line-clamp-2">${m.title}</h3>
                            <button onclick="window.location.href='player.html?id=${m.match_id || m.id}&q=1080'" 
                                class="btn-play w-full py-4 text-white text-xs tracking-widest ${!isLive ? 'opacity-20 pointer-events-none' : ''}">
                                WATCH NOW
                            </button>
                        </div>`;
                });
            } catch (e) { document.getElementById('grid').innerHTML = "Fetch Blocked. Refresh."; }
        }

        function closeTG() { document.getElementById('tg-popup').style.display = 'none'; sessionStorage.setItem('tg_seen', 'true'); }
        window.onload = () => { 
            loadMatches();
            if(!sessionStorage.getItem('tg_seen')) setTimeout(() => document.getElementById('tg-popup').style.display='flex', 4000);
        };
    </script>
</body>
</html>
