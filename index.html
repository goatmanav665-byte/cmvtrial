<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMVLIVE - Watch Live Matches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #FF4500; --secondary: #00FFFF; --bg: #0A0A1F; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 15% 15%, rgba(255, 69, 0, 0.1), transparent 40%), radial-gradient(circle at 85% 85%, rgba(0, 255, 255, 0.05), transparent 40%); z-index: -1; }
        .match-card { background: rgba(16, 24, 48, 0.8); border: 1px solid rgba(0, 255, 255, 0.1); backdrop-filter: blur(10px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 28px; }
        .match-card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 69, 0, 0.2); }
        .live-badge { background: #dc2626; animation: pulse 2s infinite; box-shadow: 0 0 15px #dc2626; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        .btn-watch { background: linear-gradient(135deg, var(--primary), #FF8C00); transition: 0.3s; border-radius: 18px; font-weight: 900; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="text-center mb-16">
        <h1 class="text-5xl md:text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-cyan-400">CMVLIVE</h1>
        <p class="text-slate-400 font-bold uppercase tracking-[0.3em] text-[10px] mt-2">Premium Experience by @cricketmemesverse873</p>
    </header>

    <div id="grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        </div>

    <div id="qModal" class="modal">
        <div class="bg-[#0f172a] p-8 rounded-[35px] border-2 border-orange-500 w-full max-w-sm text-center shadow-2xl">
            <h3 class="text-2xl font-black mb-6 uppercase text-orange-500 italic">Select Quality</h3>
            <div id="qList" class="space-y-3"></div>
            <button onclick="closeModal()" class="mt-8 text-slate-500 font-bold uppercase text-xs tracking-widest">Dismiss</button>
        </div>
    </div>

    <script>
        const API = "https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";
        let matches = [];

        async function init() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                matches = data.matches || [];
                render();
            } catch (e) {
                document.getElementById('grid').innerHTML = `<p class="text-red-500 col-span-full text-center">Connection Error.</p>`;
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            matches.forEach((m, i) => {
                const isLive = (m.status || "").toUpperCase() === "LIVE";
                grid.innerHTML += `
                    <div class="match-card p-6 flex flex-col">
                        <div class="relative rounded-[22px] overflow-hidden mb-6 aspect-video">
                            <img src="${m.image}" class="w-full h-full object-cover">
                            ${isLive ? '<span class="live-badge absolute top-4 left-4 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase">LIVE</span>' : ''}
                        </div>
                        <div class="flex-grow">
                            <p class="text-cyan-400 text-[10px] font-bold uppercase tracking-widest mb-2">${m.tournament}</p>
                            <h3 class="text-xl font-bold leading-snug mb-8 line-clamp-2 text-white">${m.title}</h3>
                        </div>
                        <button onclick="${isLive ? `openQ(${i})` : ''}" class="btn-watch w-full py-4 text-white rounded-2xl text-sm tracking-widest ${!isLive ? 'opacity-20 cursor-not-allowed grayscale' : ''}">
                            ${isLive ? '<i class="fas fa-play mr-2"></i> WATCH LIVE' : 'NOT LIVE'}
                        </button>
                    </div>`;
            });
        }

        function openQ(idx) {
            const m = matches[idx];
            const list = document.getElementById('qList');
            list.innerHTML = "";
            const master = m.auto_streams?.[0]?.auto || "";
            
            if(master.includes("RESOLUTION=")) {
                const lines = master.split("\n");
                lines.forEach((l, i) => {
                    if(l.includes("RESOLUTION=")) {
                        const res = l.split("RESOLUTION=")[1].split(",")[0].split("x")[1] + "p";
                        list.innerHTML += `<button onclick="go('${lines[i+1].trim()}')" class="w-full p-4 bg-slate-800 rounded-2xl border border-transparent hover:border-cyan-400 flex justify-between items-center transition group">
                            <span class="font-bold text-slate-300 group-hover:text-cyan-400">${res}</span> 
                            <i class="fas fa-play-circle text-orange-500"></i>
                        </button>`;
                    }
                });
                document.getElementById('qModal').style.display = 'flex';
            } else {
                go(m.adfree_stream || m.dai_stream);
            }
        }
        function go(u) { window.location.href = `player.html?url=${encodeURIComponent(u)}`; }
        function closeModal() { document.getElementById('qModal').style.display = 'none'; }
        init();
    </script>
</body>
</html>
