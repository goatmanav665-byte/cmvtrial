<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMVLIVE Player</title>
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-container { width: 100%; height: 100%; position: relative; }
        .shaka-played-range { background: #FF4500 !important; }
        .shaka-range-element::-webkit-slider-thumb { background: #FF4500 !important; }
        #watermark { position: absolute; top: 15px; right: 15px; width: 50px; opacity: 0.5; z-index: 10; pointer-events: none; }
        #loader { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .spin { width:35px; height:35px; border:3px solid #FF4500; border-top-color:transparent; border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <img id="watermark" src="https://fancode.com/favicon.ico">
    <div class="video-container" data-shaka-player-container shaka-controls="true">
        <video id="video" data-shaka-player autoplay playsinline style="width:100%;height:100%;" crossorigin="anonymous"></video>
        <div id="loader"><div class="spin"></div><p style="color:#FF4500; font-family:sans-serif; font-size:10px; font-weight:bold; margin-top:20px; letter-spacing:2px;">BYPASSING SECURITY...</p></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let streamUrl = urlParams.get('url');

        // BYPASS: This proxy is the best for FanCode as it keeps the original M3U8 headers intact
        const FINAL_URL = "https://corsproxy.io/?url=" + encodeURIComponent(streamUrl);

        async function init() {
            const video = document.getElementById('video');
            const container = document.querySelector('[data-shaka-player-container]');
            const loader = document.getElementById('loader');

            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({
                'controlPanelElements': ['play_pause', 'mute', 'time_and_duration', 'spacer', 'quality', 'fullscreen'],
                'seekBarColors': { base: 'rgba(255,255,255,.2)', buffered: 'rgba(255,255,255,.4)', played: '#FF4500' }
            });

            player.configure({
                streaming: { bufferingGoal: 20 }, // Increased buffer for stability
                drm: { clearKeys: {} }
            });

            // ─── THE HEADER BYPASS ───
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                // Strips the 'Origin' and 'Referer' to look like an official device
                request.headers['User-Agent'] = 'ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1';
                request.headers['Referer'] = 'https://fancode.com/';
                delete request.headers['Origin'];
            });

            try {
                await player.load(FINAL_URL);
                loader.style.display = 'none';
            } catch (e) {
                console.log("Retrying direct load...");
                try {
                    await player.load(streamUrl);
                    loader.style.display = 'none';
                } catch (err) {
                    loader.innerHTML = '<div style="text-align:center"><p style="color:red; font-weight:bold;">BYPASS FAILED</p><p style="color:white; font-size:10px; margin-top:10px;">Link might be expired.</p></div>';
                }
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
        window.onload = () => { if(!window.shaka) init(); };
    </script>
</body>
</html>
